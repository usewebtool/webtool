name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify npm token is configured
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN is not configured"
            exit 1
          fi

      - name: Run unit tests
        run: go test ./...

      - name: Build GitHub release assets
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate npm packages
        run: node npm/build-packages.mjs

      - name: Publish npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          node --input-type=module <<'EOF'
          import { readFileSync } from "node:fs";
          import { spawnSync } from "node:child_process";

          const manifest = JSON.parse(readFileSync("dist/npm/manifest.json", "utf8"));

          for (const pkg of manifest.publishOrder) {
            console.log(`Publishing ${pkg.name}@${pkg.version} from ${pkg.dir}`);
            const result = spawnSync(
              "npm",
              ["publish", "--access", "public", "--ignore-scripts"],
              {
                cwd: pkg.dir,
                env: process.env,
                stdio: "inherit",
              },
            );

            if (result.status !== 0) {
              process.exit(result.status ?? 1);
            }
          }
          EOF
